name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

concurrency:
  group: pages
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Write version file
        run: echo "${{ github.sha }}" > public/version.txt

      - name: Install, build, and upload site
        uses: withastro/action@v6

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  purge-cache:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for origin to serve new deployment
        run: |
          TARGET_SHA="${{ github.sha }}"
          MAX_ATTEMPTS=60
          INTERVAL=5

          echo "Polling https://hawksley.dev/version.txt for $TARGET_SHA"

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            CACHE_BUSTER=$(openssl rand -hex 16)
            CURRENT_SHA=$(curl -sSfL "https://hawksley.dev/version.txt?cb=${CACHE_BUSTER}" 2>/dev/null || echo "")
            CURRENT_SHA=$(echo "$CURRENT_SHA" | tr -d '[:space:]')
            if [ "$CURRENT_SHA" = "$TARGET_SHA" ]; then
              echo "Site is serving the new version after $attempt attempt(s)."
              echo "Waiting 10s for global propagation."
              sleep 10
              exit 0
            fi
            echo "Attempt $attempt/$MAX_ATTEMPTS: site is still on the old version. Retrying in ${INTERVAL}s."
            sleep "$INTERVAL"
          done

          echo "::warning::Site didn't update within $((MAX_ATTEMPTS * INTERVAL))s. Purging cache anyways."

      - name: Purge Cloudflare cache
        run: |
          curl -sSf \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache"
  submit-indexnow:
    needs: purge-cache
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs to IndexNow
        run: |
          URLS_RAW=$(curl -sSf https://hawksley.dev/sitemap.txt | tr -d '\r' | grep -v '^$')

          URL_JSON=$(echo "$URLS_RAW" | sed 's/\(.*\)/"\1"/' | paste -sd, -)
          URL_JSON="[$URL_JSON]"

          curl -sSf \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"hawksley.dev\",
              \"key\": \"${{ secrets.INDEXNOW_KEY }}\",
              \"keyLocation\": \"https://hawksley.dev/${{ secrets.INDEXNOW_KEY }}.txt\",
              \"urlList\": $URL_JSON
            }"
